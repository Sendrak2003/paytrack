# Nginx конфиг для paytrack — положить в /etc/nginx/sites-available/paytrack
# и сделать симлинк: ln -s /etc/nginx/sites-available/paytrack /etc/nginx/sites-enabled/

# Frontend: paytrack.mikhailgusev.dev → localhost:3080
server {
    listen 80;
    server_name paytrack.mikhailgusev.dev;

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API: api.paytrack.mikhailgusev.dev → localhost:8090
server {
    listen 80;
    server_name api.paytrack.mikhailgusev.dev;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
